<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日文單字卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 圖示組件
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        function App() {
            const [queue, setQueue] = useState([]);
            const [totalCards, setTotalCards] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [error, setError] = useState(null);

            // 語音功能
            const speak = useCallback((text) => {
                if (!text || !window.speechSynthesis) return;
                try {
                    window.speechSynthesis.cancel();
                    const cleanText = text.split('{')[0].replace(/[\n\r]/g, ' ').trim();
                    const u = new SpeechSynthesisUtterance(cleanText);
                    u.lang = 'ja-JP';
                    u.rate = 0.9;
                    window.speechSynthesis.speak(u);
                } catch (e) { console.error("語音錯誤", e); }
            }, []);

            // 檔案讀取
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setError(null);

                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const text = ev.target.result;
                        const lines = text.split(/\r?\n/);
                        const parsed = [];

                        lines.forEach((line) => {
                            const firstComma = line.indexOf(',');
                            if (firstComma !== -1) {
                                const front = line.substring(0, firstComma).trim();
                                let back = line.substring(firstComma + 1).trim();
                                back = back.replace(/^"|"$/g, '').replace(/""/g, '"');
                                if (front) parsed.push({ front, back });
                            }
                        });

                        if (parsed.length > 0) {
                            setQueue(parsed);
                            setTotalCards(parsed.length);
                            setIsFlipped(false);
                            // 第一次讀取成功後發音
                            speak(parsed[0].front);
                        } else {
                            setError("檔案內容格式不正確（找不到逗號隔開的單字）");
                        }
                    } catch (err) {
                        setError("讀取檔案時發生錯誤：" + err.message);
                    }
                };
                reader.readAsText(file, 'UTF-8');
            };

            const handleNext = (e) => {
                if (e) e.stopPropagation();
                const nextQueue = queue.slice(1);
                setQueue(nextQueue);
                setIsFlipped(false);
                if (nextQueue.length > 0) speak(nextQueue[0].front);
            };

            const currentCard = queue[0];

            // 處理翻面發音
            const toggleFlip = () => {
                const newFlipped = !isFlipped;
                setIsFlipped(newFlipped);
                if (currentCard) {
                    speak(newFlipped ? currentCard.back : currentCard.front);
                }
            };

            // 初始畫面
            if (totalCards === 0) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                        <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-200">
                            <Icon name="book-open" size={48} className="mx-auto text-indigo-500 mb-4" />
                            <h1 className="text-2xl font-bold text-slate-800 mb-2">日文單字卡 App</h1>
                            <p className="text-slate-500 mb-8 text-sm">請選擇您的 CSV 檔案</p>
                            {error && <p className="text-red-500 mb-4 text-xs bg-red-50 p-2 rounded">{error}</p>}
                            <label className="block w-full bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg cursor-pointer active:scale-95 transition-all">
                                選擇 CSV 檔案
                                <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                            </label>
                        </div>
                    </div>
                );
            }

            // 完成畫面
            if (queue.length === 0) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6">
                        <Icon name="tada" size={64} className="text-yellow-500 mb-4" />
                        <h2 className="text-2xl font-bold mb-6">全部複習完畢！</h2>
                        <button onClick={() => location.reload()} className="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold">重新開始</button>
                    </div>
                );
            }

            // 單字卡畫面
            return (
                <div className="max-w-md mx-auto p-4 min-h-screen flex flex-col pt-10">
                    <div className="flex items-center justify-between mb-6 px-2">
                        <div className="text-sm font-bold text-slate-400">進度：{totalCards - queue.length + 1} / {totalCards}</div>
                        <button onClick={() => location.reload()} className="text-slate-400 p-2"><Icon name="refresh-ccw" size={20}/></button>
                    </div>

                    <div 
                        onClick={toggleFlip}
                        className="flex-1 bg-white rounded-[2.5rem] card-shadow border border-white flex flex-col p-8 transition-all active:scale-[0.98] cursor-pointer"
                    >
                        {!isFlipped ? (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-6">
                                <div className="text-6xl font-black text-slate-800">{currentCard.front}</div>
                                <Icon name="volume-2" className="text-indigo-300" size={32} />
                                <div className="text-slate-300 text-sm mt-10">點擊卡片翻面</div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col h-full">
                                <div className="flex-1 flex flex-col items-center justify-center pt-4">
                                    <p className="text-2xl text-slate-700 leading-relaxed text-center whitespace-pre-wrap">
                                        {currentCard.back.replace(/{.*?}/g, '\n').trim()}
                                    </p>
                                </div>
                                <button 
                                    onClick={handleNext}
                                    className="w-full py-5 mt-6 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-lg active:bg-indigo-700"
                                >
                                    下一張
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
